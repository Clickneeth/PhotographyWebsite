<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clickneeth</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1 class="logo">CLICKNEETH</h1>
        <p class="tagline">
            I don't click photos for fun.<br>
            I capture memories — mine and yours — frozen in time.
        </p>
    </div>
</section>

<!-- GALLERY -->
<section class="gallery">
    <div class="gallery-grid" id="galleryGrid"></div>
</section>

<!-- FEEDBACK SECTION -->
<section class="feedback">
    <div class="feedback-content">
        <h2>Enjoyed the experience?</h2>
        <p>
            Your feedback means a lot.<br>
            Help me grow by sharing your thoughts.
        </p>

        <a href="https://forms.gle/3zFcycshN3RBdcgC6"
           target="_blank"
           class="feedback-btn">
            Leave Feedback
        </a>
    </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
    <span class="close">&times;</span>
    <span class="arrow" id="prev">&#10094;</span>
    <img class="modal-content" id="modalImg">
    <div class="signature">© CLICKNEETH</div>
    <span class="arrow" id="next">&#10095;</span>
</div>

<script src="js/script.js"></script>
</body>
</html>
